services:
  - type: web
    name: ethereum-analytics
    runtime: python
    repo: https://github.com/tu-usuario/tu-repo  # cámbialo
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:server
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render genera una automáticamente
